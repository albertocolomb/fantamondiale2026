<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantaMondiale 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080f09;--panel:#0f1a10;--panel2:#162118;--border:#1e3321;--green:#16a34a;--green2:#34d399;--gold:#fbbf24;--gold2:#f59e0b;--text:#e5e7eb;--muted:#6b7280;--red:#ef4444;--amber:#d97706;--purple:#9b59b6;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{text-align:center;padding:28px 20px 20px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:250px;background:radial-gradient(ellipse,rgba(22,163,74,.13) 0%,transparent 70%);pointer-events:none}
h1{font-family:'Oswald',sans-serif;font-size:clamp(22px,5vw,44px);font-weight:700;letter-spacing:2px;color:var(--text)}
h1 span{color:var(--gold)}
.h-sub{font-size:11px;letter-spacing:5px;color:var(--muted);margin-top:5px;text-transform:uppercase}
.wrap{max-width:1280px;margin:0 auto;padding:18px 14px 80px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.main{flex:1 1 580px;min-width:0;display:flex;flex-direction:column;gap:14px}
.side{display:none}
@media(max-width:700px){
  .side{position:static!important;width:100%}
  .wrap{flex-direction:column}
}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{background:var(--panel2);padding:11px 16px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-head.purple{color:#c89bf0}
.card-body{padding:14px 16px}
select,input{background:#1a2a1c;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none}
.btn{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.8px;text-transform:uppercase;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:filter .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{filter:brightness(1.15)}
.btn-amber{background:var(--amber);color:#fff}
.viewer-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:rgba(29,78,216,.08);border-bottom:1px solid rgba(29,78,216,.2)}
.viewer-bar label{font-size:12px;color:#93c5fd;font-weight:600}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{flex:1;min-width:70px;padding:9px 4px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.tab.active{background:var(--panel2);border-color:var(--green);color:var(--green2)}
.tab.r16-tab.active{border-color:var(--purple);color:#c89bf0}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--panel2);padding:8px 10px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid #151f16;text-align:center;vertical-align:middle}
tr:hover td{background:rgba(22,163,74,.04)}
.grp-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald',sans-serif;border:1px solid}
.match-name{font-weight:600;white-space:nowrap;text-align:left}
.match-date{font-size:11px;color:var(--muted);white-space:nowrap}
.divider-row td{background:var(--panel2);color:var(--muted);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-bottom:1px solid var(--border)}
.pred-val{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--muted)}
.pred-val.filled{color:var(--gold)}
.real-val{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--muted)}
.real-val.filled{color:var(--gold2)}
select.real{width:60px;padding:4px 2px;text-align:center;background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.25);color:var(--muted);border-radius:5px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700}
select.real.filled{color:var(--gold);border-color:var(--gold2);background:rgba(245,158,11,.1)}
td.ok{background:rgba(22,163,74,.1)}
td.ko{background:rgba(239,68,68,.07)}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:5px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;transition:filter .15s}
.lb-row:hover{filter:brightness(1.1)}
.lb-row.gold{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.22)}
.lb-row.silver{background:rgba(200,200,200,.05);border-color:rgba(200,200,200,.15)}
.lb-row.bronze{background:rgba(180,100,30,.06);border-color:rgba(180,100,30,.18)}
.lb-row.viewing{border-color:rgba(29,78,216,.5);background:rgba(29,78,216,.08)}
.lb-pos{font-family:'Oswald',sans-serif;font-size:17px;min-width:26px;text-align:center}
.lb-name{flex:1;font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.view-tag{font-size:10px;background:#1d4ed8;color:#bfdbfe;padding:1px 5px;border-radius:4px}
.lb-bar{width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.lb-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:2px}
.lb-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#c89bf0)}
.lb-score{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--green2);min-width:32px;text-align:right}
.lb-score.purple{color:#c89bf0}
.lb-pts{font-size:10px;color:var(--muted)}
#toast{position:fixed;top:14px;right:14px;z-index:999;padding:10px 18px;border-radius:8px;color:#fff;font-weight:600;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none;max-width:320px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px 30px;min-width:270px;text-align:center}
.modal h3{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.modal-note{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.err-msg{color:var(--red);font-size:12px;margin-bottom:8px}
.note-box{font-size:11px;color:var(--muted);background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);border-radius:6px;padding:8px 12px;margin:10px 0}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:18px 0 10px;padding:0 6px}
.podium-col{display:flex;flex-direction:column;align-items:center;flex:1}
.podium-block{width:100%;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:8px 4px;color:#fff}
.podium-block.p1{background:linear-gradient(180deg,#fbbf24,#b8860b);height:110px}
.podium-block.p2{background:linear-gradient(180deg,#d1d5db,#8b95a3);height:85px}
.podium-block.p3{background:linear-gradient(180deg,#cd7f32,#8b4f1e);height:65px}
.podium-medal{font-size:22px}
.podium-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;margin-top:2px;text-align:center;line-height:1.3}
.podium-pts{font-size:11px;opacity:.9}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;text-align:center}
.tbd{color:#7c5fa8;font-style:italic}


.side{display:none!important}
.main{flex:1 1 100%;max-width:100%}
.tab{flex:1;min-width:80px;font-size:11px;padding:8px 4px}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:20px 0 10px;padding:0 10px}
.podium-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:160px}
.podium-block{width:100%;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:10px 6px}
.podium-block.p1{background:linear-gradient(180deg,#fbbf24,#b8860b);min-height:120px}
.podium-block.p2{background:linear-gradient(180deg,#d1d5db,#8b95a3);min-height:90px}
.podium-block.p3{background:linear-gradient(180deg,#cd7f32,#8b4f1e);min-height:70px}
.podium-medal{font-size:26px}
.podium-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;margin-top:4px;text-align:center;line-height:1.3;color:#fff}
.podium-pts{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}
.phase-title{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--green2);text-align:center;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.phase-title.purple{color:#c89bf0}
.lb-total{border-color:rgba(251,191,36,.4)!important;background:rgba(251,191,36,.06)!important}
.lb-total .lb-score{color:var(--gold2)}
.lb-total .lb-bar-fill{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.tbd-msg{font-size:13px;color:var(--muted);text-align:center;padding:40px 20px;font-style:italic}

</style>
</head>
<body>
<header>
  <div style="font-size:42px;margin-bottom:6px">&#9917;</div>
  <h1>FantaMondiale <span>2026</span></h1>
  <div class="h-sub">USA &middot; Canada &middot; Messico</div>
</header>
<div id="toast"></div>
<div class="wrap">
  <div class="main">

    <!-- ADMIN BAR -->
    <div class="card" id="adminBar" style="display:none">
      <div class="card-head">&#128275; Admin attivo</div>
      <div class="card-body">
        <div class="note-box">&#9888;&#65039; Le modifiche ai risultati qui sono solo per anteprima in questa sessione. Per renderle definitive scrivi i risultati ad Alberto.</div>
        <button class="btn" style="background:#374151;color:#d1d5db;font-size:11px;padding:5px 10px" onclick="logoutAdmin()">Esci da Admin</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="flex-wrap:wrap;gap:3px">
      <button class="tab active" onclick="setTab('G1',this)">Giornata 1</button>
      <button class="tab" onclick="setTab('G2',this)">Giornata 2</button>
      <button class="tab" onclick="setTab('G3',this)">Giornata 3</button>
      <button class="tab r16-tab" onclick="setTab('R16',this)">Sedicesimi</button>
      <button class="tab r16-tab" onclick="setTab('OTT',this)">Ottavi</button>
      <button class="tab r16-tab" onclick="setTab('QUA',this)">Quarti</button>
      <button class="tab r16-tab" onclick="setTab('SEM',this)">Semifinali</button>
      <button class="tab r16-tab" onclick="setTab('TER',this)">3°/4° Posto</button>
      <button class="tab r16-tab" onclick="setTab('FIN',this)">Finale</button>
      <button class="tab" style="background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.3);color:var(--gold2)" onclick="setTab('CLS',this)">&#127942; Classifiche</button>
    </div>

    <!-- MATCH/PHASE CARD -->
    <div class="card">
      <div class="card-head" id="panelTitle">&#128197; Giornata 1</div>
      <div class="viewer-bar" id="viewerBar" style="display:none">
        <label>&#128065; Pronostici di:</label>
        <select id="viewerSel" onchange="onViewerChange()"></select>
        <span id="viewerNote" style="font-size:11px;color:#93c5fd"></span>
      </div>
      <div id="tableWrap"></div>
      <div id="R16W"    style="display:none"></div>
      <div id="OTTW"   style="display:none"></div>
      <div id="QUAW"   style="display:none"></div>
      <div id="SEMW"   style="display:none"></div>
      <div id="FINW"   style="display:none"></div>
      <div id="TERW"   style="display:none"></div>
      <div id="CLSW"   style="display:none" class="card-body"></div>
      <div id="LF"     style="display:none" class="card-body"></div>
    </div>

  </div>
  <!-- sidebar vuota (nascosta) -->
  <div class="side"></div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-bg" id="adminModal">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:36px;margin-bottom:6px">&#128274;</div>
    <h3>Accesso Admin</h3>
    <div class="modal-note">Inserisci il PIN per modificare risultati</div>
    <input type="password" id="pinIn" placeholder="&bull; &bull; &bull; &bull;" maxlength="6"
      onkeydown="if(event.key==='Enter')checkPin()"
      style="width:100%;text-align:center;letter-spacing:8px;font-size:22px;margin-bottom:10px">
    <div class="err-msg" id="pinErr" style="display:none">PIN errato.</div>
    <div class="modal-btns">
      <button class="btn btn-amber" onclick="checkPin()">Entra</button>
      <button class="btn" style="background:#374151;color:#d1d5db" onclick="closeAdmin()">Annulla</button>
    </div>
  </div>
</div>

<!-- FIXED ADMIN BUTTON -->
<button class="btn btn-amber" id="adminToggleBtn"
  style="position:fixed;bottom:16px;right:16px;z-index:50;opacity:.7;font-size:11px;box-shadow:0 4px 16px rgba(0,0,0,.4)"
  onclick="openAdmin()">&#128274; Admin</button>

      +'</tr>';
  });
  w.innerHTML='<div class="tbl-wrap"><table><thead><tr><th>#</th>'+(matches[0]&&matches[0].gr?'<th>Grp</th>':'')+'<th>Data</th>'
    +'<th style="text-align:left;min-width:170px">Partita</th>'
    +'<th>'+label+'</th><th>Risultato</th><th></th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderGirone(g){
  hideAll();
  document.getElementById('tableWrap').style.display='block';
  var ms=MATCHES.filter(function(m){return m.g===g;});
  var vP=gp(VU),rows='',lastGr='';
  ms.forEach(function(m){
    if(m.gr!==lastGr){lastGr=m.gr;rows+='<tr class="divider-row"><td colspan="7">Gruppo '+m.gr+'</td></tr>';}
    var myV=vP[m.id]||'',real=RESULTS[m.id]||'';
    var ok=real&&myV===real,ko=real&&myV&&myV!==real;
    var icon=ok?'\u2705':ko?'\u274c':real?'\u26aa':'';
    var c=GRP_COL[m.gr];
    var realCell=isAdmin
      ?'<select class="real'+(real?' filled':'')+'" onchange="onRealGirone(this)" data-id="'+m.id+'"">'
        +'<option value="">-</option><option value="1"'+(real==='1'?' selected':'')+'>1</option>'
        +'<option value="X"'+(real==='X'?' selected':'')+'>X</option>'
        +'<option value="2"'+(real==='2'?' selected':'')+'>2</option></select>'
      :'<span class="real-val'+(real?' filled':'')+'">'+(real||'-')+'</span>';
    rows+='<tr>'
      +'<td style="color:#6b7280;font-size:11px">'+m.id+'</td>'
      +'<td><span class="grp-badge" style="background:'+c+'22;color:'+c+';border-color:'+c+'44">'+m.gr+'</span></td>'
      +'<td class="match-date">'+m.data+'</td>'
      +'<td class="match-name">'+m.casa+' - '+m.fuori+'</td>'
      +'<td class="'+(ok?'ok':ko?'ko':'')+'"><span class="pred-val'+(myV?' filled':'')+'">'+(myV||'-')+'</span></td>'
      +'<td>'+realCell+'</td>'
      +'<td style="font-size:16px;text-align:center">'+icon+'</td>'
      +'</tr>';
  });
  document.getElementById('tableWrap').innerHTML='<div class="tbl-wrap"><table><thead><tr>'
    +'<th>#</th><th>Grp</th><th>Data</th><th style="text-align:left;min-width:160px">Partita</th>'
    +'<th>'+VU+'</th><th>Risultato</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderPhase(){
  if(AT==='G1'||AT==='G2'||AT==='G3'){renderGirone(AT);return;}
  if(AT==='R16'){renderMatchTable(R16,R16PREDS,R16RESULTS,'R16W',isAdmin,VU);return;}
  if(AT==='OTT'){renderMatchTable(OTTAVI,OTTPREDS,OTTRESULTS,'OTTW',isAdmin,VU);return;}
  if(AT==='QUA'){renderMatchTable(QUARTI,QUARTIPREDS,QUARTIRESULTS,'QUAW',isAdmin,VU);return;}
  if(AT==='SEM'){renderMatchTable(SEMI,SEMIPREDS,SEMIRESULTS,'SEMW',isAdmin,VU);return;}
  if(AT==='FIN'){renderMatchTable(FINALE,FINALEPREDS,FINALERESULTS,'FINW',isAdmin,VU);return;}
  if(AT==='TER'){renderMatchTable(TER3,TER3PREDS,TER3RESULTS,'TERW',isAdmin,VU);return;}
  if(AT==='CLS'){renderClassifiche();return;}
}

/* ── REAL RESULT HANDLERS ── */
function onRealGirone(sel){var id=sel.dataset.id;
  RESULTS[id]=sel.value;sel.className='real'+(sel.value?' filled':'');
  toast('Risultato '+id+' aggiornato');renderClassifiche&&AT==='CLS'&&renderClassifiche();
}
var PHASE_RESULTS={'R16W':R16RESULTS,'OTTW':OTTRESULTS,'QUAW':QUARTIRESULTS,'SEMW':SEMIRESULTS,'FINW':FINALERESULTS,'TERW':TER3RESULTS};
function onRealAny(sel){var wrapId=sel.getAttribute("data-wrap");var id=sel.getAttribute("data-id");
  PHASE_RESULTS[wrapId][id]=sel.value;sel.className='real'+(sel.value?' filled':'');
  toast('Risultato '+id+' aggiornato');
}

/* ── SCORES ── */
function calcScore(friends,predsMap,resultsMap,matchList){
  return friends.map(function(f){
    var fp=predsMap[f]||{},pts=0;
    matchList.forEach(function(m){if(resultsMap[m.id]&&fp[m.id]===resultsMap[m.id])pts++;});
    return{name:f,pts:pts};
  }).sort(function(a,b){return b.pts-a.pts;});
}
function addRanks(arr){
  var rank=1;
  for(var i=0;i<arr.length;i++){
    arr[i].rank=i>0&&arr[i].pts===arr[i-1].pts?arr[i-1].rank:rank;
    rank++;
  }
  return arr;
}
function medalFor(r){return r===1?'\ud83e\udd47':r===2?'\ud83e\udd48':r===3?'\ud83e\udd49':null;}
function clsFor(r){return r===1?'gold':r===2?'silver':r===3?'bronze':'';}

/* ── RENDER CLASSIFICHE ── */
function renderClassifiche(){
  hideAll();
  var w=document.getElementById('CLSW');w.style.display='block';

  var phases=[
    {label:'Fase a Gironi (72 partite)',preds:PREDS,      results:RESULTS,      matches:MATCHES,color:'var(--green2)'},
    {label:'Sedicesimi di Finale',      preds:R16PREDS,   results:R16RESULTS,   matches:R16,    color:'#c89bf0'},
    {label:'Ottavi di Finale',          preds:OTTPREDS,   results:OTTRESULTS,   matches:OTTAVI, color:'#c89bf0'},
    {label:'Quarti di Finale',          preds:QUARTIPREDS,results:QUARTIRESULTS,matches:QUARTI, color:'#c89bf0'},
    {label:'Semifinali',                preds:SEMIPREDS,  results:SEMIRESULTS,  matches:SEMI,   color:'#c89bf0'},
  ];

  var html='';

  // Classifica Generale
  var totalScores=FRIENDS.map(function(f){
    var pts=0;
    phases.forEach(function(ph){
      var fp=ph.preds[f]||{};
      ph.matches.forEach(function(m){if(ph.results[m.id]&&fp[m.id]===ph.results[m.id])pts++;});
    });
    // finale
    var ff=FINALEPREDS[f]||{};
    FINALE.forEach(function(m){if(FINALERESULTS[m.id]&&ff[m.id]===FINALERESULTS[m.id])pts++;});
    // 3/4 posto
    var ft=TER3PREDS[f]||{};
    TER3.forEach(function(m){if(TER3RESULTS[m.id]&&ft[m.id]===TER3RESULTS[m.id])pts++;});
    return{name:f,pts:pts};
  }).sort(function(a,b){return b.pts-a.pts;});
  addRanks(totalScores);

  html+='<div class="phase-title" style="color:var(--gold2)">&#127942; CLASSIFICA GENERALE</div>';
  html+=renderPodio(totalScores,'var(--gold2)');
  html+=renderLbList(totalScores,'lb-total','var(--gold2)');

  // Singole fasi
  phases.forEach(function(ph){
    var played=ph.matches.filter(function(m){return ph.results[m.id];}).length;
    if(ph.matches.length===0){
      html+='<div class="phase-title" style="color:'+ph.color+'">'+ph.label+'</div>';
      html+='<div class="tbd-msg" style="padding:20px">Partite non ancora definite</div>';
      return;
    }
    var scores=addRanks(calcScore(FRIENDS,ph.preds,ph.results,ph.matches));
    html+='<div class="phase-title" style="color:'+ph.color+'">'+ph.label
      +'<br><span style="font-size:11px;opacity:.7">'+played+' / '+ph.matches.length+' partite giocate</span></div>';
    html+=renderPodio(scores,ph.color);
    html+=renderLbList(scores,'','var(--green2)');
  });

  // 3/4 posto
  html+='<div class="phase-title" style="color:#cd7f32">Finale 3°/4° Posto</div>';
  if(TER3.length===0){
    html+='<div class="tbd-msg" style="padding:20px">Partita non ancora definita</div>';
  } else {
    var ts=addRanks(calcScore(FRIENDS,TER3PREDS,TER3RESULTS,TER3));
    html+=renderPodio(ts,'#cd7f32');
    html+=renderLbList(ts,'','#cd7f32');
  }

  // Finale
  html+='<div class="phase-title" style="color:#c89bf0">Finale</div>';
  if(FINALE.length===0){
    html+='<div class="tbd-msg" style="padding:20px">Partita non ancora definita</div>';
  } else {
    var fs=addRanks(calcScore(FRIENDS,FINALEPREDS,FINALERESULTS,FINALE));
    html+=renderPodio(fs,'#c89bf0');
    html+=renderLbList(fs,'','#c89bf0');
  }

  w.innerHTML=html;
}

function renderPodio(scores,color){
  var groups={};
  scores.forEach(function(s){if(!groups[s.rank])groups[s.rank]=[];groups[s.rank].push(s);});
  var html='<div class="podium-wrap">';
  [2,1,3].forEach(function(rank){
    var g=groups[rank];if(!g||!g.length)return;
    var cls=rank===1?'p1':rank===2?'p2':'p3';
    var med=rank===1?'\ud83e\udd47':rank===2?'\ud83e\udd48':'\ud83e\udd49';
    html+='<div class="podium-col"><div class="podium-block '+cls+'">'
      +'<div class="podium-medal">'+med+'</div>'
      +'<div class="podium-name">'+g.map(function(s){return s.name;}).join('<br>')+'</div>'
      +'<div class="podium-pts">'+g[0].pts+' pt</div>'
      +'</div></div>';
  });
  return html+'</div>';
}

function renderLbList(scores,extraCls,scoreColor){
  var html='<div style="padding:0 14px 16px">';
  scores.forEach(function(s){
    var med=medalFor(s.rank),cls=clsFor(s.rank);
    html+='<div class="lb-row '+cls+' '+extraCls+'" style="margin-bottom:6px">'
      +'<div class="lb-pos">'+(med||s.rank)+'</div>'
      +'<div class="lb-name">'+s.name+'</div>'
      +'<div class="lb-score" style="color:'+scoreColor+'">'+s.pts+'<span class="lb-pts">pt</span></div>'
      +'</div>';
  });
  return html+'</div>';
}

/* ── TABS ── */
function setTab(t,el){
  AT=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  var titles={G1:'Giornata 1',G2:'Giornata 2',G3:'Giornata 3',
    R16:'Sedicesimi di Finale',OTT:'Ottavi di Finale',
    QUA:'Quarti di Finale',SEM:'Semifinali',FIN:'Finale',TER:'Finale 3°/4° Posto',
    CLS:'Classifiche e Podi'};
  document.getElementById('panelTitle').textContent=titles[t]||t;
  uvb();renderPhase();
}

/* ── ADMIN ── */
function openAdmin(){document.getElementById('adminModal').classList.add('open');document.getElementById('pinIn').value='';document.getElementById('pinErr').style.display='none';setTimeout(function(){document.getElementById('pinIn').focus();},100);}
function closeAdmin(){document.getElementById('adminModal').classList.remove('open');}
function checkPin(){
  if(document.getElementById('pinIn').value===ADMIN_PIN){
    isAdmin=true;closeAdmin();
    document.getElementById('adminBar').style.display='block';
    document.getElementById('adminToggleBtn').style.display='none';
    renderPhase();toast('Admin attivato');
  }else{document.getElementById('pinErr').style.display='block';document.getElementById('pinIn').value='';}
}
function logoutAdmin(){
  isAdmin=false;
  document.getElementById('adminBar').style.display='none';
  document.getElementById('adminToggleBtn').style.display='block';
  renderPhase();toast('Admin disattivato','info');
}
document.getElementById('adminModal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeAdmin();});

var tTimer;
function toast(msg,type){
  type=type||'ok';var el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  el.style.background=type==='ok'?'#16a34a':type==='err'?'#dc2626':'#d97706';
  clearTimeout(tTimer);tTimer=setTimeout(function(){el.style.display='none';},3000);
}

window.addEventListener('load',function(){uvb();renderPhase();});
</script>
